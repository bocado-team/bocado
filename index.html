<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocado - Kitchen Social Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --bg-color: #f4f1ea; --primary: #2d4635; --secondary: #a65d39; --accent: #d9c5b2; }
        body { background-color: var(--bg-color); font-family: 'Outfit', sans-serif; color: #1a1a1a; }
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        .recipe-card { transition: all 0.3s ease; background: white; border: 1px solid var(--accent); }
        .recipe-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(45, 70, 53, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="bg-[#2d4635] p-4 shadow-lg text-[#f4f1ea] sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-[#d9c5b2] w-10 h-10 rounded-lg flex items-center justify-center text-[#2d4635] font-bold text-xl">B</div>
                <span class="text-2xl font-800 tracking-tighter">Bocado</span>
            </div>
            <button onclick="toggleModal()" class="bg-[#a65d39] px-6 py-2 rounded-full font-bold shadow-md hover:scale-105 transition">
                + Pubblica
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="status" class="text-center text-xs font-bold text-secondary mb-6 italic">Connessione al Cloud...</div>
        <div id="recipeContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl border-t-8 border-[#2d4635]">
            <h2 class="text-2xl font-bold mb-4 text-[#2d4635]">Condividi una Ricetta</h2>
            <form id="recipeForm" class="space-y-4">
                <input type="text" id="name" placeholder="Nome del piatto" class="w-full p-2 border-b border-accent outline-none focus:border-primary" required>
                <input type="text" id="author" placeholder="Il tuo nome Chef" class="w-full p-2 border rounded text-sm">
                <textarea id="ingredients" placeholder="Ingredienti (separati da virgola)..." class="w-full p-2 border rounded text-sm" rows="2" required></textarea>
                <textarea id="steps" placeholder="Procedimento passo dopo passo..." class="w-full p-2 border rounded text-sm" rows="3" required></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="kcal" placeholder="Kcal" class="p-2 border rounded text-sm">
                    <input type="number" id="protein" placeholder="Proteine (g)" class="p-2 border rounded text-sm">
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="toggleModal()" class="text-gray-400 font-semibold">Annulla</button>
                    <button type="submit" id="btnSubmit" class="bg-[#2d4635] text-white px-8 py-2 rounded-full font-bold shadow-md">Pubblica Ora</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configurazione usando le tue chiavi
        const firebaseConfig = {
            apiKey: "AIzaSyBuAFofFjuhlmS3zbtk28AzxfbKKwLZ3n0",
            authDomain: "bocado-c7012.firebaseapp.com",
            projectId: "bocado-c7012",
            storageBucket: "bocado-c7012.firebasestorage.app",
            messagingSenderId: "396484410548",
            appId: "1:396484410548:web:48271c034df66d849c6be1",
            measurementId: "G-FK6KQLVXJJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recipesCol = collection(db, "recipes");

        // Funzione per pubblicare
        document.getElementById('recipeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Invio...";

            try {
                await addDoc(recipesCol, {
                    name: document.getElementById('name').value,
                    author: document.getElementById('author').value || "Chef Bocado",
                    ingredients: document.getElementById('ingredients').value,
                    steps: document.getElementById('steps').value,
                    kcal: parseInt(document.getElementById('kcal').value) || 0,
                    protein: parseInt(document.getElementById('protein').value) || 0,
                    createdAt: new Date()
                });
                toggleModal();
                document.getElementById('recipeForm').reset();
            } catch (err) {
                console.error("Errore Firebase:", err);
                alert("Assicurati di aver impostato le regole di scrittura su Firestore!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Pubblica Ora";
            }
        });

        // Caricamento in tempo reale
        const q = query(recipesCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const recipes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const container = document.getElementById('recipeContainer');
            document.getElementById('status').innerText = `Community Online: ${recipes.length} ricette 🟢`;
            
            container.innerHTML = recipes.map(r => `
                <div class="recipe-card rounded-2xl overflow-hidden p-6 flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Chef ${r.author}</span>
                            <h3 class="text-xl font-bold text-primary">${r.name}</h3>
                        </div>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <span class="text-[10px] font-bold bg-secondary/10 text-secondary px-2 py-1 rounded">🔥 ${r.kcal} KCAL</span>
                        <span class="text-[10px] font-bold bg-primary/10 text-primary px-2 py-1 rounded">💪 ${r.protein}G PROT</span>
                    </div>
                    <p class="text-xs text-gray-500 font-bold uppercase mb-1">Ingredienti</p>
                    <p class="text-sm text-gray-700 mb-4">${r.ingredients}</p>
                    <div class="mt-auto pt-4 border-t border-accent/20">
                        <p class="text-sm text-gray-600 italic line-clamp-3">"${r.steps}"</p>
                    </div>
                </div>
            `).join('');
        });
    </script>

    <script>
        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }
    </script>
</body>
</html>
